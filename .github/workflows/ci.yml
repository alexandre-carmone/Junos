name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck (x86_64)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cargo cache
        uses: Swatinem/rust-cache@v2

      # Mirrors `just check` — no codegen, fast feedback.
      - name: cargo check (server)
        run: cargo check -p junos-server

      - name: cargo check (web / wasm)
        run: cargo check -p junos-web --target wasm32-unknown-unknown
