<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>Junos — Astrophotography Control</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        html, body {
            /* Lock the page: no pinch-zoom, no double-tap zoom, no rubber-band
               scroll, no horizontal pan. Each tab owns its own scrolling. */
            width: 100%;
            height: 100%;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: pan-y;
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
        }
        body {
            font-family: 'Courier New', monospace;
            background: #0a0a0f;
            color: #c0c0d0;
            position: fixed;
            inset: 0;
        }
        #app { width: 100%; height: 100%; }

        /* ── Touch-friendly interactive elements ─────────────────────────── */

        /* Eliminate the 300 ms tap delay on all interactive elements */
        button, input, select, textarea, a, label {
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
        }

        /* Minimum 44 × 44 px touch targets on buttons */
        button {
            min-height: 44px;
            min-width: 44px;
            cursor: pointer;
            user-select: none;
            -webkit-user-select: none;
        }

        /* Visible press feedback that works on touch (no :hover needed) */
        button:active {
            opacity: 0.65;
        }

        /* Slightly taller inputs/selects for fat fingers */
        input, select {
            min-height: 36px;
        }

        /* iOS: prevent zoom-on-focus for inputs without an explicit font-size */
        input, select, textarea {
            font-size: max(16px, 1em);
        }

        /* ── Responsive layout ────────────────────────────────────────────── */

        /* Sky pane defaults — full dynamic viewport height so iOS chrome
           doesn't crop. The top status strip sits on top with pointer-events
           disabled, so the sky can fill the whole viewport underneath. */
        .sky-pane {
            height: 100dvh;
        }

        /* Polar Align body owns its own vertical scroll; contain prevents
           drag from bubbling up to the page on iOS. */
        .polar-body {
            overscroll-behavior: contain;
            -webkit-overflow-scrolling: touch;
            touch-action: pan-y;
        }

        /* Top status strip — may wrap on very narrow widths */
        .status-strip {
            line-height: 1.3;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Sky search box — fluid width capped at 230px */
        .sky-search {
            width: min(230px, calc(100vw - 120px));
        }

        /* Sky controls collapsible panel — fluid, capped to viewport */
        .sky-controls-panel {
            min-width: 180px;
            max-width: calc(100vw - 16px);
            max-height: calc(100dvh - 120px);
            overflow-y: auto;
            overscroll-behavior: contain;
        }

        /* Sky context menu — never overflow the viewport */
        .sky-ctx-menu {
            max-width: calc(100vw - 16px);
            max-height: calc(100dvh - 32px);
            overflow-y: auto;
        }

        /* Bottom confirm popup — safe-area aware */
        .sky-confirm-popup {
            padding-left:   max(16px, env(safe-area-inset-left))  !important;
            padding-right:  max(16px, env(safe-area-inset-right)) !important;
            padding-bottom: max(14px, env(safe-area-inset-bottom)) !important;
        }

        /* Focus tab grid — desktop default */
        .focus-body {
            display: grid;
            grid-template-columns: 2fr 1fr;
            min-height: 0;
        }
        .focus-left-col {
            display: grid;
            grid-template-rows: 1fr 110px;
            min-height: 0;
        }

        /* ── TABLET  768 – 1023 px ───────────────────────────────────────── */
        @media (min-width: 768px) and (max-width: 1023px) {
            .sky-controls-panel { min-width: 160px; }
            .focus-body { grid-template-columns: 3fr 2fr; }
            .focus-left-col { grid-template-rows: 1fr 90px; }
            .focus-hfr-pane canvas { height: 76px !important; }
        }

        /* ── SMARTPHONE  ≤ 767 px  (iPhone SE → 14 Pro Max) ─────────────── */
        @media (max-width: 767px) {

            /* iOS Safari zooms into any input whose computed font-size is
               below 16 px when it gains focus. Many components set inline
               `font-size:12px` which overrides the base rule above, so force
               a 16 px floor on mobile with !important. */
            input, select, textarea {
                font-size: 16px !important;
            }

            /* Status strip — smaller, tighter, still non-interactive */
            .status-strip {
                font-size: 10px !important;
                padding: 4px 8px !important;
            }

            /* Inputs: prevent fixed widths from overflowing */
            input[type="text"],
            input[type="number"] {
                max-width: 100% !important;
                box-sizing: border-box !important;
            }

            /* Sky search — fill the row, leave space for controls gear */
            .sky-search {
                width: calc(100vw - 72px) !important;
                top: 34px !important;
            }

            /* Sky controls — slide below status strip, cap height */
            .sky-controls {
                top: 34px !important;
            }
            .sky-controls-panel {
                min-width: 0 !important;
                width: calc(100vw - 16px);
                max-height: calc(100dvh - 160px);
            }
            .sky-controls-panel input[type="number"] {
                width: 72px !important;
            }

            /* Sky map: push time-slider to full-width row above action buttons */
            .sky-time-slider {
                left: 8px !important;
                bottom: 100px !important;
            }

            /* Sky action buttons: move up so they clear the time slider */
            .sky-actions {
                bottom: 52px !important;
            }

            /* Zoom bar: stays right, shifted to clear time slider */
            .sky-zoom-bar {
                top: 72px !important;
                bottom: 150px !important;
            }

            /* Confirm popup: stack the two main rows vertically */
            .sky-confirm-popup {
                flex-direction: column !important;
                align-items: stretch !important;
            }
            .sky-confirm-popup > div:last-child {
                justify-content: space-between;
                flex-wrap: wrap;
            }
            .sky-confirm-popup button {
                flex: 1 1 30%;
                min-width: 0;
                padding: 12px 10px !important;
                font-size: 13px !important;
            }

            /* Focus tab */
            .focus-header {
                padding: 0 12px !important;
                flex-wrap: wrap !important;
                gap: 10px !important;
                font-size: 12px !important;
                height: auto !important;
            }
            .focus-tab-root {
                grid-template-rows: auto 1fr !important;
            }
            .focus-body {
                grid-template-columns: 1fr !important;
                grid-template-rows: minmax(50dvh, 1fr) auto !important;
            }
            .focus-body > div:first-child {
                border-right: none !important;
                border-bottom: 1px solid #222 !important;
            }
            .focus-left-col {
                grid-template-rows: 1fr 72px !important;
            }
            .focus-hfr-pane {
                padding: 4px !important;
            }
            .focus-hfr-pane canvas {
                height: 62px !important;
            }
            .focus-setting-row > span:first-child {
                flex: 0 0 110px !important;
            }

            /* Polar Align tab */
            .polar-header {
                padding: 6px 12px 6px 56px !important;
                gap: 6px 10px !important;
                font-size: 12px !important;
            }
            .polar-status-msg {
                flex-basis: 100% !important;
                white-space: normal !important;
                font-size: 11px !important;
            }
            .polar-body {
                padding: 10px 12px !important;
                gap: 10px !important;
            }
            .polar-section {
                padding: 8px 10px !important;
            }
            .polar-field-row {
                flex-wrap: wrap !important;
                gap: 4px 8px !important;
            }
            .polar-field-label {
                flex: 0 0 100% !important;
                font-size: 12px !important;
            }
            .polar-preview {
                min-height: 140px !important;
                max-height: 40dvh !important;
            }
            .polar-refresh-row {
                flex-direction: column !important;
                gap: 10px !important;
            }
            .polar-correction {
                flex: 0 0 auto !important;
                align-self: center !important;
            }
            .polar-error-grid {
                grid-template-columns: 1fr !important;
            }

            /* Safe-area padding for iPhone notch / home indicator */
            #rekos-app {
                padding-bottom: env(safe-area-inset-bottom);
            }
        }

        /* ── Gear nav spin animation ── */
        @keyframes gear-spin-slow {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        /* ── Very small phones  ≤ 374 px  (iPhone SE 1st gen) ───────────── */
        @media (max-width: 374px) {
            button {
                min-width: 36px !important;
                font-size: 12px !important;
            }
            .sky-search { width: calc(100vw - 72px) !important; }
            .status-strip { font-size: 9px !important; }
            .polar-header { padding-left: 48px !important; font-size: 11px !important; }
            .polar-stage-badge { font-size: 10px !important; padding: 3px 8px !important; }
        }
    </style>
    <!-- Trunk replaces this with the built WASM entry point -->
    <link data-trunk rel="rust" data-wasm-opt="z" />
    <!-- Static binary catalogs served at /junos.bin and /dso.bin -->
    <link data-trunk rel="copy-file" href="public/junos.bin"/>
    <link data-trunk rel="copy-file" href="public/dso.bin"/>
    <!-- Nebulae runtime index + images (generated by scripts/download_nebulae.py) -->
    <link data-trunk rel="copy-file" href="public/nebulae.json"/>
    <link data-trunk rel="copy-dir" href="public/nebulae"/>
</head>
<body>
    <div id="app"></div>
    <script>
        // iOS Safari ignores user-scalable=no and lets two-finger gestures
        // pinch-zoom anyway. Block the gesture events explicitly.
        ['gesturestart', 'gesturechange', 'gestureend'].forEach(ev => {
            document.addEventListener(ev, e => e.preventDefault(), { passive: false });
        });
        // Kill double-tap zoom (iOS).
        let lastTouchEnd = 0;
        document.addEventListener('touchend', e => {
            const now = Date.now();
            if (now - lastTouchEnd <= 350) e.preventDefault();
            lastTouchEnd = now;
        }, { passive: false });
        // Block any multi-touch move (pinch / two-finger pan) at the document
        // level. Single-finger touchmove still propagates so internal scrolls
        // and the sky map's drag gestures keep working.
        document.addEventListener('touchmove', e => {
            if (e.touches.length > 1) e.preventDefault();
        }, { passive: false });
    </script>
</body>
</html>
